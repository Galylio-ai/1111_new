<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify your email</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .header { background: #4F46E5; padding: 32px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 24px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .otp { display: inline-block; font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #4F46E5; background: #EEF2FF; padding: 16px 32px; border-radius: 8px; margin: 24px 0; }
    .note { font-size: 13px; color: #888; }
    .footer { padding: 16px 32px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Verify your email address</h1></div>
    <div class="body">
      <p>Hi <strong>{{ name }}</strong>,</p>
      <p>Use the code below to verify your email. It expires in <strong>5 minutes</strong>.</p>
      <div style="text-align:center">
        <span class="otp">{{ otp }}</span>
      </div>
      <p class="note">If you didn't create an account, you can safely ignore this email.</p>
    </div>
    <div class="footer">This code expires in 5 minutes and is valid for one use only.</div>
  </div>
</body>
</html>
