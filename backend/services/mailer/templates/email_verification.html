<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification de votre e-mail</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .header { background: #E11D2D; padding: 32px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 24px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .otp { display: inline-block; font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #E11D2D; background: #FFF3D0; padding: 16px 32px; border-radius: 8px; margin: 24px 0; }
    .note { font-size: 13px; color: #888; }
    .footer { padding: 16px 32px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Verification de votre e-mail</h1></div>
    <div class="body">
      <p>Bonjour <strong>{{ name }}</strong>,</p>
      <p>Utilisez le code ci-dessous pour verifier votre adresse e-mail. Il expire dans <strong>{{ otp_ttl_minutes | default(5) }} minutes</strong>.</p>
      <div style="text-align:center">
        <span class="otp">{{ otp }}</span>
      </div>
      <p class="note">Si vous n'avez pas cree de compte, vous pouvez ignorer cet e-mail.</p>
    </div>
    <div class="footer">Ce code est valable une seule fois.</div>
  </div>
</body>
</html>
