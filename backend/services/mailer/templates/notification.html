<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .header { background: #0891B2; padding: 32px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 24px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .footer { padding: 16px 32px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>{{ title | default("Notification") }}</h1></div>
    <div class="body">
      <p>Hi <strong>{{ name }}</strong>,</p>
      <p>{{ message | default("You have a new notification.") }}</p>
      {% if action_url %}
      <p style="text-align:center">
        <a href="{{ action_url }}" style="display:inline-block;background:#0891B2;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-weight:bold;">
          {{ action_label | default("View") }}
        </a>
      </p>
      {% endif %}
    </div>
    <div class="footer">You received this notification from your account.</div>
  </div>
</body>
</html>
