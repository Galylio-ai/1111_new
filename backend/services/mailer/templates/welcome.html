<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .header { background: #4F46E5; padding: 32px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 28px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .footer { padding: 16px 32px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Welcome aboard!</h1></div>
    <div class="body">
      <p>Hi <strong>{{ name }}</strong>,</p>
      <p>We're thrilled to have you join us. Your account has been created successfully.</p>
      <p>If you have any questions, feel free to reply to this email.</p>
    </div>
    <div class="footer">You received this email because you signed up.</div>
  </div>
</body>
</html>
